name: flex_checkout_flutter
description: Flutter plugin for Flex Checkout SDK — wraps native iOS (FlexCheckout) and Android (com.flex.checkout) implementations.
version: 1.2.2
homepage: https://github.com/flexapp/flex-checkout-flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.flex.checkout.flutter
        pluginClass: FlexCheckoutFlutterPlugin
      ios:
        pluginClass: FlexCheckoutFlutterPlugin
